name: Goal watcher (FCM)

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 min (GitHub puede atrasarlo algunos min)
  workflow_dispatch: {}       # permite correrlo a mano

permissions:
  contents: write

concurrency:
  group: goal-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet google-auth requests
      - name: Detectar goles y enviar push
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python goal_watcher.py
      - name: Guardar estado si cambió
        run: |
          if ! git diff --quiet -- live/_seen_scores.json; then
            git config user.name "goal-watcher"
            git config user.email "actions@users.noreply.github.com"
            git add live/_seen_scores.json
            git commit -m "goal-watcher: estado de marcadores [skip ci]"
            git push
          else
            echo "sin cambios"
          fi
